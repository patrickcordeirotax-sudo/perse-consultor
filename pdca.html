<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PDCA — Sistema de Gestão Comercial PERSE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080E18;--bg2:#0D1520;--bg3:#121C2E;--bg4:#182236;
  --gold:#C8991A;--gold2:#E8B840;--gold3:#F5D060;
  --p:#1A6B3A;--pg:#0d3a20;--p2:#2ECC71;
  --d:#1B3A8B;--d2:#5BA3F5;
  --c:#8B6B00;--c2:#F1C40F;
  --a:#8B1A1A;--a2:#E74C3C;
  --white:#F8F4ED;--stone:#8899AA;--muted:#4A5568;
  --border:rgba(200,153,26,0.12);--border2:rgba(255,255,255,0.06);
  --radius:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;font-size:15px;-webkit-font-smoothing:antialiased}
.app{display:grid;grid-template-columns:252px 1fr;min-height:100vh}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.sb-top{padding:26px 22px 18px;border-bottom:1px solid var(--border2)}
.sb-logo{font-family:'Syne',sans-serif;font-size:11px;font-weight:800;letter-spacing:6px;color:var(--gold);text-transform:uppercase;margin-bottom:3px}
.sb-tagline{font-size:11px;color:var(--stone)}
.sb-nav{padding:14px 0;flex:1}
.nav-gl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;padding:12px 22px 5px}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 22px;font-size:13.5px;font-weight:500;color:var(--stone);cursor:pointer;transition:all .15s;border-left:3px solid transparent;user-select:none}
.nav-item:hover{color:var(--white);background:rgba(255,255,255,0.03)}
.nav-item.active{color:var(--gold2);border-left-color:var(--gold);background:rgba(200,153,26,0.07)}
.nav-icon{font-size:15px;width:19px;text-align:center}
.sb-stats{padding:16px 22px;border-top:1px solid var(--border2)}
.ms{display:flex;justify-content:space-between;align-items:center;padding:5px 0}
.ms-l{font-size:11px;color:var(--stone)}
.ms-v{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--gold2)}
.main{overflow-y:auto;min-height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.pt{font-family:'Syne',sans-serif;font-size:17px;font-weight:700}
.ps{font-size:11px;color:var(--stone);margin-top:2px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:'Instrument Sans',sans-serif}
.btn-gold{background:var(--gold);color:var(--bg)}.btn-gold:hover{background:var(--gold2)}
.btn-out{background:transparent;border:1px solid var(--border2);color:var(--stone)}.btn-out:hover{border-color:var(--gold);color:var(--gold)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-del{background:rgba(139,26,26,.18);border:1px solid rgba(139,26,26,.28);color:var(--a2)}.btn-del:hover{background:rgba(139,26,26,.32)}
.view{display:none;padding:24px 28px 48px}.view.active{display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.kc{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden}
.kc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
.kc-p::after{background:linear-gradient(90deg,var(--p),var(--p2))}
.kc-d::after{background:linear-gradient(90deg,var(--d),var(--d2))}
.kc-c::after{background:linear-gradient(90deg,var(--c),var(--c2))}
.kc-a::after{background:linear-gradient(90deg,var(--a),var(--a2))}
.kl{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:#fff;margin-bottom:10px}
.kl-p{background:var(--p)}.kl-d{background:var(--d)}.kl-c{background:var(--c)}.kl-a{background:var(--a)}
.kv{font-family:'JetBrains Mono',monospace;font-size:34px;font-weight:600;line-height:1;color:var(--white);margin-bottom:3px}
.kla{font-size:10px;color:var(--stone);letter-spacing:1px;text-transform:uppercase}
.pbar{height:5px;background:rgba(255,255,255,0.05);border-radius:2px;margin-top:10px;overflow:hidden}
.pbar-f{height:100%;border-radius:2px;transition:width .6s}
.sec-t{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--white);letter-spacing:1px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.sec-t::after{content:'';flex:1;height:1px;background:var(--border2)}
.pipeline{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:28px}
.pc-col{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden}
.pc-h{padding:11px 13px;display:flex;align-items:center;justify-content:space-between}
.pc-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.pc-count{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700}
.pc-body{padding:7px;min-height:72px}
.pc-card{background:var(--bg4);border:1px solid var(--border2);border-radius:7px;padding:9px 11px;margin-bottom:5px;cursor:pointer;transition:all .15s}
.pc-card:hover{border-color:rgba(200,153,26,.3);transform:translateY(-1px)}
.pcc-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.pcc-meta{font-size:10px;color:var(--stone)}
.tier-badge{font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:4px;display:inline-block;margin-top:3px}
.filters{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.fchip{padding:5px 13px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border2);color:var(--stone);transition:all .15s}
.fchip:hover{border-color:var(--gold);color:var(--gold)}
.fchip.on{background:var(--gold);color:var(--bg);border-color:var(--gold)}
.srch{flex:1;min-width:180px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:7px 13px;font-size:13px;color:var(--white);outline:none;font-family:'Instrument Sans',sans-serif}
.srch:focus{border-color:var(--gold)}
.pli{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:14px 18px;margin-bottom:8px;display:grid;grid-template-columns:3fr 1fr 1fr 1fr auto;gap:14px;align-items:center;cursor:pointer;transition:all .15s}
.pli:hover{border-color:var(--border);transform:translateX(2px)}
.pli-co{font-size:14.5px;font-weight:600;margin-bottom:2px}
.pli-me{font-size:11.5px;color:var(--stone)}
.pli-se{font-size:11px;color:var(--gold)}
.sbadge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:600;border:1px solid;white-space:nowrap}
.s-plan{color:#5BA3F5;border-color:rgba(91,163,245,.3);background:rgba(91,163,245,.08)}
.s-do{color:#F1C40F;border-color:rgba(241,196,15,.3);background:rgba(241,196,15,.08)}
.s-check{color:#E8B840;border-color:rgba(232,184,64,.3);background:rgba(232,184,64,.08)}
.s-win{color:#2ECC71;border-color:rgba(46,204,113,.3);background:rgba(46,204,113,.08)}
.s-lost{color:#E74C3C;border-color:rgba(231,76,60,.3);background:rgba(231,76,60,.08)}
.pm{height:4px;background:rgba(255,255,255,.05);border-radius:2px;width:78px;overflow:hidden}
.pm-f{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold),var(--gold2))}
.wizard{max-width:780px}
.wsteps{display:flex;gap:0;margin-bottom:28px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border2)}
.ws{flex:1;padding:13px 14px;text-align:center;cursor:pointer;transition:all .2s;border-right:1px solid var(--border2);opacity:.5}
.ws:last-child{border-right:none}
.ws.active{opacity:1;background:rgba(200,153,26,.08)}
.ws.done{opacity:.75}
.ws-ic{font-size:18px;margin-bottom:3px}
.ws-lb{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:2px;text-transform:uppercase;color:var(--stone)}
.ws-nm{font-size:12px;font-weight:700;color:var(--white);margin-top:2px}
.ws.active .ws-lb{color:var(--gold)}
.ws.done .ws-lb{color:var(--p2)}
.fsec{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:22px;margin-bottom:14px}
.fsh{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border2)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.ff{grid-column:1/-1}
.fgrp{display:flex;flex-direction:column;gap:5px}
label{font-size:11px;font-weight:600;color:var(--stone);letter-spacing:.5px;text-transform:uppercase}
input,select,textarea{background:var(--bg4);border:1px solid var(--border2);border-radius:7px;padding:9px 13px;font-size:13.5px;color:var(--white);outline:none;font-family:'Instrument Sans',sans-serif;transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
select option{background:var(--bg3)}
textarea{resize:vertical;min-height:76px;line-height:1.6}
.stars{display:flex;gap:3px;margin-top:5px}
.star{font-size:26px;cursor:pointer;color:var(--muted);transition:color .12s;user-select:none}
.star.on{color:var(--gold2)}
.chkgp{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:5px}
.chkopt{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--bg4);border:1px solid var(--border2);border-radius:7px;cursor:pointer;transition:all .15s;font-size:13px;font-weight:400;letter-spacing:0;text-transform:none;color:var(--stone)}
.chkopt:hover{border-color:var(--gold)}
.chkopt input[type=checkbox]{width:15px;height:15px;accent-color:var(--gold);flex-shrink:0;cursor:pointer}
.log-item{background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:13px;margin-bottom:7px;position:relative}
.log-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;margin-bottom:7px;align-items:end}
.del-btn{width:28px;height:28px;border-radius:6px;background:rgba(139,26,26,.15);border:1px solid rgba(139,26,26,.2);color:var(--a2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;flex-shrink:0}
.del-btn:hover{background:rgba(139,26,26,.3)}
.dh{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:22px 26px;margin-bottom:18px}
.dh-co{font-family:'Syne',sans-serif;font-size:22px;font-weight:800}
.dh-se{font-size:13px;color:var(--gold);margin-top:3px}
.dh-meta{display:flex;gap:14px;flex-wrap:wrap;margin-top:11px;padding-top:11px;border-top:1px solid var(--border2)}
.dm{font-size:12px;color:var(--stone)}.dm strong{color:var(--white)}
.ph-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.ph-card{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden}
.ph-head{padding:12px 14px;display:flex;align-items:center;gap:9px}
.ph-lt{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:#fff}
.ph-tt{font-size:13px;font-weight:700}
.ph-st{font-size:10px;color:var(--stone)}
.ph-body{padding:13px 14px;font-size:12px;color:var(--stone);line-height:1.7}
.ph-body strong{color:var(--white);display:block;font-size:12.5px;margin-top:6px;margin-bottom:1px}
.ph-body strong:first-child{margin-top:0}
.ltable{width:100%;border-collapse:collapse;font-size:12.5px}
.ltable th{padding:7px 11px;text-align:left;font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border2)}
.ltable td{padding:9px 11px;border-bottom:1px solid rgba(255,255,255,.03)}
.ltable tr:hover td{background:rgba(255,255,255,.02)}
.empty{text-align:center;padding:60px 32px}
.empty-ic{font-size:48px;margin-bottom:12px;opacity:.45}
.empty-t{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--stone);margin-bottom:6px}
.empty-s{font-size:13px;color:var(--muted)}
.toast{position:fixed;bottom:22px;right:22px;padding:13px 18px;border-radius:var(--radius);font-size:13px;font-weight:600;z-index:9999;transform:translateY(16px);opacity:0;transition:all .25s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.t-ok{background:var(--p);color:#fff;border:1px solid var(--p2)}
.t-err{background:var(--a);color:#fff}
@keyframes fi{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.ani{animation:fi .28s ease both}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="sb-top">
    <div class="sb-logo">PDCA · PERSE</div>
    <div class="sb-tagline">Sistema de Gestão Comercial</div>
  </div>
  <nav class="sb-nav">
    <div class="nav-gl">Principal</div>
    <div class="nav-item active" onclick="go('dashboard',this)"><span class="nav-icon">📊</span>Dashboard</div>
    <div class="nav-item" onclick="go('list',this)"><span class="nav-icon">📋</span>Todos os PDCAs</div>
    <div class="nav-item" onclick="go('new',this)"><span class="nav-icon">➕</span>Novo Ciclo</div>
    <div class="nav-gl">Visões</div>
    <div class="nav-item" onclick="go('pipeline',this)"><span class="nav-icon">🔄</span>Pipeline Visual</div>
    <div class="nav-item" onclick="go('reports',this)"><span class="nav-icon">📈</span>Relatório</div>
  </nav>
  <div class="sb-stats" id="sbS"></div>
</aside>
<div class="main">
  <div class="topbar">
    <div><div class="pt" id="pgT">Dashboard</div><div class="ps" id="pgS">Visão geral da campanha PERSE</div></div>
    <div style="display:flex;gap:9px;align-items:center">
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--stone)" id="dt"></div>
      <button class="btn btn-gold" onclick="go('new',null)">+ Novo PDCA</button>
    </div>
  </div>
  <div class="view active" id="v-dashboard"><div class="kpi-grid" id="kpiG"></div><div class="sec-t">Pipeline</div><div class="pipeline" id="miniP"></div><div class="sec-t">Atividade Recente</div><div id="recA"></div></div>
  <div class="view" id="v-list"><div class="filters"><input class="srch" id="srch" placeholder="🔍  Buscar empresa, setor, decisor..." oninput="renderList()"><div class="fchip on" onclick="setF('all',this)">Todos</div><div class="fchip" onclick="setF('plan',this)">🎯 Plano</div><div class="fchip" onclick="setF('do',this)">⚡ Execução</div><div class="fchip" onclick="setF('check',this)">🔎 Check</div><div class="fchip" onclick="setF('win',this)">✅ Fechado</div><div class="fchip" onclick="setF('lost',this)">❌ Perdido</div></div><div id="pList"></div></div>
  <div class="view" id="v-pipeline"><div class="pipeline" id="fullP" style="grid-template-columns:repeat(5,1fr);min-height:380px"></div></div>
  <div class="view" id="v-new"><div class="wizard"><div class="wsteps" id="wSt"></div><div id="wC" class="ani"></div><div style="display:flex;justify-content:space-between;margin-top:18px"><button class="btn btn-out" id="bBack" onclick="prev()">← Voltar</button><div style="display:flex;gap:9px"><button class="btn btn-out" onclick="saveDraft()">💾 Rascunho</button><button class="btn btn-gold" id="bNext" onclick="nxt()">Próxima →</button></div></div></div></div>
  <div class="view" id="v-detail"><div id="detC"></div></div>
  <div class="view" id="v-reports"><div id="repC"></div></div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
const K='pdca_perse_v3';
let db=JSON.parse(localStorage.getItem(K)||'[]');
let filt='all',step=0,eid=null,draft={},logs=[],eng=0;
function save(){localStorage.setItem(K,JSON.stringify(db))}
document.getElementById('dt').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short',year:'numeric'}).toUpperCase();

const PM={dashboard:{t:'Dashboard',s:'Visão geral da campanha PERSE'},list:{t:'Todos os PDCAs',s:'Histórico completo de ciclos'},new:{t:'Novo Ciclo PDCA',s:'Registre um cliente ou oportunidade'},pipeline:{t:'Pipeline Visual',s:'Funil de vendas'},reports:{t:'Relatório',s:'Análise de performance'},detail:{t:'Detalhe',s:''}};
const ST={plan:{l:'Planejamento',i:'🎯',c:'s-plan',col:'#5BA3F5'},do:{l:'Em Execução',i:'⚡',c:'s-do',col:'#F1C40F'},check:{l:'Verificando',i:'🔎',c:'s-check',col:'#E8B840'},win:{l:'Fechado ✅',i:'🏆',c:'s-win',col:'#2ECC71'},lost:{l:'Perdido',i:'❌',c:'s-lost',col:'#E74C3C'}};
const TRS={'💎 Diamante':'#C0392B','🥇 Ouro':'#D4A017','🥈 Prata':'#95A5A6','⚪ Bronze':'#555'};
const SECTS=['Transportadora','Indústria','Empresa de Segurança','Empresa Comercial','Distribuidora','Construção Civil','Agronegócio','Outro'];
const CHANS=['Telefone','WhatsApp','E-mail','Reunião Presencial','Vídeo Chamada','LinkedIn'];
const TMPS=['Frio','Morno','Quente'];
const SCRPTS=['Var. A · Empresa em comum','Var. B · Pessoa em comum','Var. C · Oportunidade única','Morno · Após evento','Morno · Cliente antigo','Quente · Indicação direta','Quente · Concorrente','Quente · Mesmo grupo','Outro'];
const OBJS=['Já tem contador','Manda por e-mail','Sem interesse','Momento difícil','Vou pensar','Bom demais pra ser verdade','Não tenho tempo','Perguntou preço','Já conhece','Outras'];

function go(v,el){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  document.getElementById('v-'+v).classList.add('active');
  if(el)el.classList.add('active');
  const m=PM[v]||{};document.getElementById('pgT').textContent=m.t||v;document.getElementById('pgS').textContent=m.s||'';
  if(v==='dashboard')renderDash();
  if(v==='list')renderList();
  if(v==='pipeline')renderPipe();
  if(v==='new'){eid=null;draft={};logs=[];eng=0;step=0;renderWiz();}
  if(v==='reports')renderRep();
  updateSB();
}

function renderDash(){
  const c={};Object.keys(ST).forEach(k=>c[k]=0);db.forEach(r=>c[r.status]=(c[r.status]||0)+1);
  const tot=db.length,contacts=db.reduce((s,r)=>s+(r.logs||[]).length,0),wins=c.win||0;
  document.getElementById('kpiG').innerHTML=`
    <div class="kc kc-p ani"><div class="kl kl-p">P</div><div class="kv">${(c.plan||0)+(c.do||0)+(c.check||0)}</div><div class="kla">Ciclos Ativos</div><div class="pbar"><div class="pbar-f" style="width:${tot?Math.round(((c.plan||0)+(c.do||0)+(c.check||0))/tot*100):0}%;background:linear-gradient(90deg,#1B3A8B,#5BA3F5)"></div></div></div>
    <div class="kc kc-d ani" style="animation-delay:.07s"><div class="kl kl-d">D</div><div class="kv">${contacts}</div><div class="kla">Contatos Feitos</div><div class="pbar"><div class="pbar-f" style="width:${Math.min(contacts*3,100)}%;background:linear-gradient(90deg,#1A6B3A,#2ECC71)"></div></div></div>
    <div class="kc kc-c ani" style="animation-delay:.14s"><div class="kl kl-c">C</div><div class="kv">${wins}</div><div class="kla">Deals Fechados</div><div class="pbar"><div class="pbar-f" style="width:${tot?Math.round(wins/tot*100):0}%;background:linear-gradient(90deg,#8B6B00,#F1C40F)"></div></div></div>
    <div class="kc kc-a ani" style="animation-delay:.21s"><div class="kl kl-a">A</div><div class="kv">${tot?Math.round(wins/tot*100):0}%</div><div class="kla">Taxa de Conversão</div><div class="pbar"><div class="pbar-f" style="width:${tot?Math.round(wins/tot*100):0}%;background:linear-gradient(90deg,#8B1A1A,#E74C3C)"></div></div></div>`;
  document.getElementById('miniP').innerHTML=Object.entries(ST).map(([k,v])=>{
    const its=db.filter(r=>r.status===k).slice(0,3);

// ── WIZARD ───────────────────────────────────────────────────────
function renderWiz(){
  const steps=[{ic:'🎯',lb:'Fase 1',nm:'PLAN'},{ic:'⚡',lb:'Fase 2',nm:'DO'},{ic:'🔎',lb:'Fase 3',nm:'CHECK'},{ic:'🔁',lb:'Fase 4',nm:'ACT'}];
  document.getElementById('wSt').innerHTML=steps.map((s,i)=>`<div class="ws ${i===step?'active':i<step?'done':''}" onclick="goSt(${i})"><div class="ws-ic">${i<step?'✓':s.ic}</div><div class="ws-lb">${s.lb}</div><div class="ws-nm">${s.nm}</div></div>`).join('');
  document.getElementById('bBack').style.display=step===0?'none':'inline-flex';
  document.getElementById('bNext').textContent=step===3?'💾 Salvar Ciclo':'Próxima →';
  const wc=document.getElementById('wC');wc.innerHTML=FORMS[step]();
  wc.classList.remove('ani');void wc.offsetWidth;wc.classList.add('ani');
  restoreForm();
  if(step===1)renderLogs();
  if(step===2)setStars(draft.eng||0);
  bindForm();
}
function goSt(i){collect();step=i;renderWiz();}
function nxt(){collect();step<3?(step++,renderWiz()):saveRec();}
function prev(){collect();step>0&&(step--,renderWiz());}
function saveDraft(){collect();toast('Rascunho salvo','ok');}

function collect(){
  document.querySelectorAll('#wC input:not([type=checkbox]):not([type=radio]),#wC select,#wC textarea').forEach(el=>{if(el.id)draft[el.id]=el.value;});
  document.querySelectorAll('#wC input[type=radio]:checked').forEach(el=>{draft[el.name]=el.value;});
}
function restoreForm(){
  Object.entries(draft).forEach(([k,v])=>{const el=document.getElementById(k);if(el&&el.type!=='checkbox'&&el.type!=='radio')el.value=v;});
  document.querySelectorAll('#wC input[type=radio]').forEach(el=>{if(draft[el.name]===el.value)el.checked=true;});
  document.querySelectorAll('#wC input[type=checkbox][data-grp]').forEach(el=>{if((draft[el.dataset.grp]||[]).includes(el.value))el.checked=true;});
}
function bindForm(){
  document.querySelectorAll('#wC input:not([type=checkbox]):not([type=radio]),#wC select,#wC textarea').forEach(el=>el.addEventListener('input',()=>{if(el.id)draft[el.id]=el.value;}));
  document.querySelectorAll('#wC input[type=radio]').forEach(el=>el.addEventListener('change',()=>{draft[el.name]=el.value;}));
  document.querySelectorAll('#wC input[type=checkbox][data-grp]').forEach(el=>el.addEventListener('change',()=>{const g=el.dataset.grp;if(!draft[g])draft[g]=[];el.checked?(!draft[g].includes(el.value)&&draft[g].push(el.value)):(draft[g]=draft[g].filter(v=>v!==el.value));}));
  if(step===2)document.querySelectorAll('.star').forEach((s,i)=>s.addEventListener('click',()=>{eng=i+1;draft.eng=i+1;setStars(i+1);}));
}
function setStars(n){document.querySelectorAll('.star').forEach((s,i)=>s.classList.toggle('on',i<n));}

// LOGS
function renderLogs(){
  const el=document.getElementById('logC');if(!el)return;
  el.innerHTML=logs.map((l,i)=>`<div class="log-item ani"><div class="log-row"><div class="fgrp"><label>Data</label><input type="date" value="${l.date||''}" onchange="logs[${i}].date=this.value" style="padding:6px 10px;font-size:12.5px"></div><div class="fgrp"><label>Canal</label><select onchange="logs[${i}].channel=this.value" style="padding:6px 10px;font-size:12.5px">${CHANS.map(c=>`<option ${l.channel===c?'selected':''}>${c}</option>`).join('')}</select></div><div class="fgrp"><label>Temperatura</label><select onchange="logs[${i}].temp=this.value" style="padding:6px 10px;font-size:12.5px">${TMPS.map(t=>`<option ${l.temp===t?'selected':''}>${t}</option>`).join('')}</select></div><button class="del-btn" onclick="rmLog(${i})">✕</button></div><textarea placeholder="Resultado — o que foi dito, reação do cliente, próximo passo..." rows="2" onchange="logs[${i}].result=this.value" style="font-size:13px;margin-top:4px">${l.result||''}</textarea></div>`).join('');
}
function addLog(){logs.push({date:new Date().toISOString().slice(0,10),channel:'Telefone',temp:'Frio',result:''});renderLogs();}
function rmLog(i){logs.splice(i,1);renderLogs();}

// SAVE
function saveRec(){
  collect();
  if(!draft.company?.trim()){toast('Informe o nome da empresa','err');step=0;renderWiz();return;}
  const id=eid||'p'+Date.now();
  const ex=db.find(r=>r.id===id);
  const rec={...(ex||{}),...draft,id,logs,status:draft.finalStatus||(ex?.status||'plan'),ua:new Date().toISOString(),ca:ex?.ca||new Date().toISOString()};
  if(ex)db=db.map(r=>r.id===id?rec:r);else db.push(rec);
  save();eid=null;draft={};logs=[];step=0;
  toast('✅ Ciclo PDCA salvo!','ok');
  setTimeout(()=>go('list',document.querySelectorAll('.nav-item')[1]),380);
}
function editP(id){const r=db.find(x=>x.id===id);if(!r)return;eid=id;draft={...r};logs=[...(r.logs||[])];eng=r.eng||0;step=0;go('new',null);document.getElementById('pgT').textContent='Editar Ciclo';}
function delP(id){if(!confirm('Excluir este ciclo? Não pode ser desfeito.'))return;db=db.filter(r=>r.id!==id);save();renderList();updateSB();toast('Excluído','err');}

<div class="fsec" style="background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:22px"><div class="fsh">📊 Indicadores Gerais</div>${[['Total de Ciclos',tot],['Contatos Feitos',contacts],['Deals Fechados',wins],['Taxa de Conversão',tot?Math.round(wins/tot*100)+'%':'—'],['Em Execução',db.filter(r=>r.status==='do').length],['Em Verificação',db.filter(r=>r.status==='check').length]].map(([l,v])=>`<div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border2)"><span style="font-size:13.5px;color:var(--stone)">${l}</span><span style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600">${v}</span></div>`).join('')}</div>

<div class="fsec" style="background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:22px"><div class="fsh">📞 Scripts Mais Usados</div>${Object.entries(scrps).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([s,n])=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border2);font-size:13px"><span style="color:var(--stone)">${s}</span><span style="font-family:'JetBrains Mono',monospace;font-weight:600">${n}x</span></div>`).join('')||'<div style="color:var(--muted);font-size:13px">Sem dados</div>'}</div>
<div class="fsec" style="background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:22px"><div class="fsh">🚧 Objeções Mais Frequentes</div>${Object.entries(objs2).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([o,n])=>`<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px"><span style="color:var(--stone)">${o}</span><span style="color:var(--a2);font-weight:600">${n}x</span></div><div class="pbar"><div class="pbar-f" style="width:${tot?Math.round(n/tot*100):0}%;background:linear-gradient(90deg,var(--a),var(--a2))"></div></div></div>`).join('')||'<div style="color:var(--muted);font-size:13px">Sem dados</div>'}</div>
</div>`;
}

function updateSB(){
  const act=db.filter(r=>!['win','lost'].includes(r.status)).length,wins=db.filter(r=>r.status==='win').length;
  const today=db.filter(r=>r.nxtDate===new Date().toISOString().slice(0,10)).length;
  document.getElementById('sbS').innerHTML=`<div class="ms"><span class="ms-l">Ciclos ativos</span><span class="ms-v">${act}</span></div><div class="ms"><span class="ms-l">Fechamentos</span><span class="ms-v">${wins}</span></div><div class="ms"><span class="ms-l">Ações hoje</span><span class="ms-v" style="${today?'color:var(--a2)':''}">${today}</span></div>`;
}
function since(iso){if(!iso)return'—';const s=Math.floor((Date.now()-new Date(iso))/1000);if(s<60)return'agora';if(s<3600)return Math.floor(s/60)+'min';if(s<86400)return Math.floor(s/3600)+'h atrás';return Math.floor(s/86400)+'d atrás';}
function toast(msg,type='ok'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast t-${type} show`;setTimeout(()=>t.classList.remove('show'),2800);}
renderDash();updateSB();
</script>
